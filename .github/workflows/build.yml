name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            arch: arm64
            runner: macos-15
          - target: darwin-x64
            arch: x64
            runner: macos-15-intel
          - target: win32-x64
            arch: x64
            runner: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build native addon
        run: pnpm exec cmake-js build --arch=${{ matrix.arch }}

      - name: Build package and run integration tests
        run: pnpm check

      - name: Prepare N-API prebuild
        shell: bash
        run: |
          node_file=$(find build -name 'nativekit.node' -type f -print -quit)
          test -n "$node_file"
          mkdir -p prebuilds/${{ matrix.target }}
          cp "$node_file" prebuilds/${{ matrix.target }}/nativekit.napi.node

      - name: Verify package contents
        run: npm pack --ignore-scripts --dry-run

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/nativekit.napi.node
          if-no-files-found: error
          retention-days: 14

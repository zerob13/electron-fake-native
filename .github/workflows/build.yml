name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            arch: arm64
            runner: macos-15
          - target: darwin-x64
            arch: x64
            runner: macos-15-intel
          - target: win32-x64
            arch: x64
            runner: windows-2022
          - target: linux-x64
            arch: x64
            runner: ubuntu-22.04
          - target: linux-arm64
            arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            dbus-x11 \
            libgtk-3-dev \
            libxcb1-dev \
            openbox \
            x11-utils \
            xauth \
            xvfb

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build native addon
        run: pnpm exec cmake-js build --arch=${{ matrix.arch }}

      - name: Build package and run integration tests
        if: runner.os != 'Linux'
        run: pnpm check

      - name: Run Linux X11 integration tests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          xvfb-run \
            --auto-servernum \
            --server-args='-screen 0 1280x1024x24' \
            bash <<'EOF'
          set -euo pipefail

          openbox >/tmp/nativekit-openbox.log 2>&1 &
          wm_pid=$!
          fixture_pid=''
          cleanup() {
            if [ -n "$fixture_pid" ]; then kill "$fixture_pid" 2>/dev/null || true; fi
            kill "$wm_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 50); do
            if xprop -root _NET_SUPPORTING_WM_CHECK 2>/dev/null \
              | grep -q '_NET_SUPPORTING_WM_CHECK'; then
              break
            fi
            sleep 0.1
          done
          xprop -root _NET_SUPPORTING_WM_CHECK \
            | grep -q '_NET_SUPPORTING_WM_CHECK'

          xmessage -geometry 320x120+20+20 'nativekit CI fixture' \
            >/tmp/nativekit-xmessage.log 2>&1 &
          fixture_pid=$!
          for attempt in $(seq 1 50); do
            if xprop -root _NET_CLIENT_LIST 2>/dev/null \
              | grep -Eq '0x[0-9a-f]+'; then
              break
            fi
            sleep 0.1
          done
          xprop -root _NET_CLIENT_LIST | grep -Eq '0x[0-9a-f]+'

          pnpm check
          timeout 90s pnpm exec electron examples/electron --smoke
          EOF

      - name: Prepare N-API prebuild
        shell: bash
        run: |
          node_file=$(find build -name 'nativekit.node' -type f -print -quit)
          test -n "$node_file"
          mkdir -p prebuilds/${{ matrix.target }}
          cp "$node_file" prebuilds/${{ matrix.target }}/nativekit.napi.node

      - name: Verify package contents
        run: npm pack --ignore-scripts --dry-run

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/nativekit.napi.node
          if-no-files-found: error
          retention-days: 14
